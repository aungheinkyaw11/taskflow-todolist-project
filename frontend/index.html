  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <!--
      This is the ONE HTML file for the entire React app.
      React will inject all the content into the <div id="root"> below.

      /* Reset default browser styles */
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; }
    </style>
  </head>
  <body>
    <!-- React mounts your entire app here -->
    <div id="root"></div>

    <!-- This loads our React app code -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
