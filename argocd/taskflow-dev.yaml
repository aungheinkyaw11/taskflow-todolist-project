apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflow-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/aungheinkyaw11/taskflow-todolist-project.git
    targetRevision: argocd
    path: helm/taskflow
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: taskflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true