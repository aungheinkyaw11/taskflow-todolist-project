backend:
  name: taskflow-backend
  replicaCount: 1
  image:
    repository: public.ecr.aws/m1p2k8l9/taskflow-backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  containerPort: 5001
  service:
    name: taskflow-backend-service
    type: ClusterIP
    port: 5001
    targetPort: 5001

frontend:
  name: taskflow-frontend
  replicaCount: 1
  image:
    repository: public.ecr.aws/m1p2k8l9/taskflow-frontend
    tag: "1.0.1"
    pullPolicy: IfNotPresent
  containerPort: 80
  service:
    name: taskflow-frontend-service
    type: ClusterIP
    port: 80
    targetPort: 80

configMap:
  name: taskflow-config
  data:
    NODE_ENV: "production"
    PORT: "5001"