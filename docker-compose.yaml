services:

#PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: taskflow_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      #Persistance volume
      - postgres_data:/var/lib/postgresql/data
      # Auto-run schema.sql on first start
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: unless-stopped

    env_file:
      - .env                # load all variables from root .env

    environment:
      DB_HOST: db           # override DB_HOST,use service name

    ports:
      - "${PORT}:${PORT}"

    depends_on:
      db:
        condition: service_healthy   # wait for DB to be ready!

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - backend

volumes:
  postgres_data: